name: Compass Manager tests

on:
  workflow_call:
  push:
    branches:
      - main
    paths-ignore:
      - .reuse
      - hack/
      - LICENSES/
      - LICENSE
      - .gitignore
      - "**.md"

  pull_request_target:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - .reuse
      - hack/
      - LICENSES/
      - LICENSE
      - .gitignore
      - "**.md"
env:
  COVERFILE: true

jobs:
  unit-tests:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Set up go environment
        uses: actions/setup-go@v6
        with:
          cache-dependency-path: go.sum
          go-version-file: go.mod
      - name: Run unit tests
        run: |
          set -o pipefail
          make test | tee test-output.txt
      - name: filter out coverage
        run: |
          #!/bin/bash

          filters=(
              "github.com/kyma-project/compass-manager/api"
              "mock"
              "test"
          )

          input="coverage.txt"
          output="coverage-filtered.txt"

          cp "$input" "$output"

          for i in "${filters[@]}"; do
            echo "filtering $i"
            cp "$output" "$output~"
            grep --invert-match $i "$output~" > "$output"
            wc -l $output
          done
          rm "$output~"

      - name: coveralls github action
        uses: coverallsapp/github-action@v2.3.6
        with:
          format: golang
          file: ./coverage-filtered.txt
          fail-on-error: false
      - name: Upload test logs artifact
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-output
          path: test-output.txt
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: "code-coverage"
          path: "coverage.txt"

  code_coverage:
    name: "Code coverage report"
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - uses: fgrosse/go-coverage-report@ae3204f4125161ae4a75780bdb57dec472bfd49c
        with:
          coverage-artifact-name: "code-coverage"
          coverage-file-name: "coverage.txt"

  summary:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: success() || failure()
    steps:
      - name: "Download test log"
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ${{ env.unit-test-log }}
      - name: "Generate summary"
        run: |
          {
            echo '# Compass Manager'
            # if test log exists
            if [ -f ${{ env.unit-test-log }} ]; then
              echo '## Unit Tests'
              printf '\n<details>\n<summary>click to expand logs</summary>\n'
              printf '\n```\n'
              cat ${{ env.unit-test-log }}
              printf '\n```\n</details>\n'
            fi
          } >> $GITHUB_STEP_SUMMARY
